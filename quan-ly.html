<!DOCTYPE html>

<html lang="vi">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Quản lý thông tin học tập</title>
        <link href="../style.css" rel="stylesheet">
    </head>
    <body>
        <header>
            <div class="header-top">
                <div style="padding-top: 12px;"><strong>IT - ĐHTN - Tư vấn học tập</strong></div>

                <div class="header-icon">
                    <button id="searchButton" onclick="toggleSearch()">
                        <img id="searchIcon"
                        src="https://img.icons8.com/ios-glyphs/30/search--v1.png" alt="Search">
                    </button>

                    <div class="search-box" id="searchBox">
                        <input type="text" class="search" id="searchInput" placeholder="Tìm kiếm">
                        <button class="search-close" type="button" onclick="toggleSearch()">
                            <img src="https://cdn-icons-png.flaticon.com/512/1828/1828778.png" alt="Close" width="10">
                        </button>
                    </div>

                    <a href="#">
                        <img src="https://img.icons8.com/ios-glyphs/30/new-post.png" alt="Mail" width="40">
                    </a>

                    <div id="loginForm">
                        <form>
                            <input type="text" class="username" id="username" placeholder="Username">
                            <input type="password" class="pass" id="pass" placeholder="Passworld">
                            <button class="a1" type="button" onclick="login()">login</button>
                        </form>
                    </div>

                    <div id="userInfo" style="display: none; margin-right: 10px;">
                        <img src="https://img.icons8.com/ios-glyphs/30/user--v1.png">
                        <button class="username" id="displayName" type="button" onclick="toPageUser()"></button>
                        <button type="button" onclick="logout()">Đăng xuất</button>
                    </div>
                </div>
            </div>

            <div class="header-logo">
                <img class="i1" src="../images/LOGO-LMS.png" alt="LOGO-LMS">

                <div class="header-icon" style="padding-right: 15px; padding-top: 10px;">
                    <a href="https://www.ttn.edu.vn/" target="_blank">
                        <img src="https://img.icons8.com/?size=100&id=1954&format=png&color=000000" alt="Trang chủ trường ĐHTN" width="50px">
                    </a>
                    <a href="https://www.facebook.com/dhtn567/" target="_blank">
                        <img src="https://img.icons8.com/?size=100&id=118468&format=png&color=000000" alt="Facebook" width="51px">
                    </a>
                </div>
            </div>
        </header>

        <ul class="menu">
            <li>
                <a href="../index.html">
                    <img src="https://img.icons8.com/?size=100&id=s7mPVCB5sKGa&format=png&color=000000" width="19px">Trang chủ
                </a>
            </li>
            <li>
                <a href="library.html">
                    <img src="https://img.icons8.com/?size=100&id=3649&format=png&color=000000" width="20px">Thư viện tài liệu
                </a>
            </li>
            <li>
                <a href="tin-tuc.html">
                    <img src="https://img.icons8.com/?size=100&id=43709&format=png&color=000000" width="20px">Tin tức & sự kiện
                </a>
            </li>
             <li>
                <a href="lien-he.html">
                    <img src="https://img.icons8.com/?size=100&id=KDZhmHF2nKEp&format=png&color=000000" width="20px">Liên hệ - Góp ý
                </a>
            </li>
            <li>
                <a href="chatbot.html">
                    <img src="https://img.icons8.com/?size=100&id=psgnW3Vh1Zro&format=png&color=000000" width="20px">Chatbot
                </a>
            </li>
        </ul>

        <div class="profile" id="studentInfo">
            <h2 style="text-align: center;">Thông tin sinh viên</h2>
            <p><strong>MSSV:</strong> <span id="mssv"></span></p>
            <p><strong>Họ và tên:</strong> <span id="ten"></span></p>
            <p><strong>Ngành:</strong> <span id="nganh"></span></p>
            <p><strong>Khóa:</strong> <span id="khoa"></span></p>
            <p><strong>Lớp:</strong> <span id="lop"></span></p>
        </div>

        <div class="course" id="courseInfo">
            <h2 style="text-align: center;">Lịch sử truy cập</h2>
            <ul id="studyHistory"></ul>
            <div style="text-align: center; margin-top: 10px;">
                <button class="a1" onclick="removeHistory()">Xóa lịch sử</button>
            </div>
        </div>

        <script src="js/data.js"></script>
        <script src="js/file.js"></script>
        <script>
            const currentUser1 = localStorage.getItem("username");
            const info = users[currentUser1];

            if (info) {
                document.getElementById("mssv").textContent = info.mssv;
                document.getElementById("ten").textContent = info.ten;
                document.getElementById("nganh").textContent = info.nganh;
                document.getElementById("khoa").textContent = info.khoa;
                document.getElementById("lop").textContent = info.lop;
            }

            const historyKey = `history_${currentUser1}`;
            const history = JSON.parse(localStorage.getItem(historyKey)) || [];

            const list = document.getElementById("studyHistory");
            if (history.length == 0) {
                list.innerHTML = "<li>Chưa có hoạt động nào.</li>"
            }
            else {
                history.forEach(title => {
                    const li = document.createElement("li");
                    li.textContent = title;
                    list.appendChild(li);
                })
            }
        </script>
    </body>
</html>
